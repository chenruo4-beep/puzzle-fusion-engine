<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 32px 0 24px;
      border-bottom: 2px solid #e8e8e8;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: #6c5ce7;
      letter-spacing: 2px;
    }
    .content {
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
      margin: 24px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .footer {
      text-align: center;
      padding: 24px 0;
      color: #999;
      font-size: 13px;
      border-top: 1px solid #e8e8e8;
    }
    .footer p { margin: 4px 0; }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      margin: 16px 0;
    }
    .btn:hover { opacity: 0.9; }
    .highlight { color: #6c5ce7; font-weight: 600; }
    .emoji { font-size: 48px; display: block; text-align: center; margin: 16px 0; }
    table.stats { width: 100%; border-collapse: collapse; margin: 16px 0; }
    table.stats td { padding: 12px; text-align: center; border: 1px solid #eee; }
    table.stats .num { font-size: 28px; font-weight: 700; color: #6c5ce7; }
    table.stats .label { font-size: 13px; color: #999; }
    .muted { color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧩 拼拼看Me</h1>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>拼拼看Me — 记录碎片，发现拼图</p>
      <p>
        <a href="{{ settings.FRONTEND_URL }}/settings/email" style="color: #6c5ce7;">管理邮件偏好</a>
        &nbsp;·&nbsp;
        <a href="{{ settings.FRONTEND_URL }}/unsubscribe" style="color: #999;">退订</a>
      </p>
    </div>
  </div>
</body>
</html>
