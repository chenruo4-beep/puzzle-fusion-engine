name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_SW3HihRV2D8ATf13OJ0tjdHLzwAi/NLOJPyMzbW" \
            -H "Content-Type: application/json" \
            -d '{"branch":"main"}'
