name: 后端测试 (Backend Test)

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"

env:
  PYTHON_VERSION: "3.12"
  # 默认使用 SQLite，无需外部数据库服务
  DATABASE_URL: "sqlite:///./test_puzzle_fusion.db"
  ENVIRONMENT: "ci"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: 代码检查 (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff 代码检查
        run: ruff check --output-format=github .

      - name: Ruff 格式检查
        run: ruff format --check .

  test:
    name: 测试 (pytest)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行测试（带覆盖率）
        run: |
          pytest --cov=. --cov-report=term --cov-report=xml -v

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: 上传测试日志（失败时）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs
          path: backend/*.log
          retention-days: 3
